<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ProPAS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/signin.css') }}">
</head>
<body>

<div class="signin-card">
    <div class="logo-container">
        <div class="logo-wrapper">
            <img src="{{ url_for('static', filename='images/IconBlue.png') }}" alt="ProPAS Logo" class="header-logo-img">
            <div class="logo-text">ProPAS</div>
        </div>
        <span class="logo-tagline">Project Proposal System</span>
    </div>

    <h2>Sign In</h2>
    
    <form method="POST" action="{{ url_for('auth.signin') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="login-btn">LOG IN</button>
    </form>

    <div class="footer-links">
        <a href="#">Forgot Password?</a>
    </div>
</div>

</body>
</html>
